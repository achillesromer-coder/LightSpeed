name: Merovingian Project Routing

on:
  pull_request:
    branches:
      - main
      - "fix/**"
    paths:
      - "apps/lightspeed-go/**"
      - "desktop/Desktop_Hooks/LightSpeed/config/project_routing.json"
      - "desktop/Desktop_Hooks/LightSpeed/Z Axis/Z-4_Merovingian/core/**"
      - "desktop/LightSpeed_Runtime/lightspeed_runtime/project_pipeline.py"
      - "desktop/LightSpeed_Runtime/lightspeed_runtime/ls_go_bridge.py"
      - "desktop/LightSpeed_Runtime/tests/test_project_pipeline.py"
      - "desktop/LightSpeed_Runtime/tests/test_ls_go_bridge.py"
      - "scripts/run_merovingian_soft_launch.py"
      - "scripts/run_cognigrex_local_stack.py"
      - "tools/run_merovingian_soft_launch.cmd"
      - "tools/run_cognigrex_local_stack.cmd"
      - ".github/workflows/merovingian-project-routing.yml"
  push:
    branches:
      - "ops/merovingian-project-routing-*"
    paths:
      - "apps/lightspeed-go/**"
      - "desktop/Desktop_Hooks/LightSpeed/config/project_routing.json"
      - "desktop/Desktop_Hooks/LightSpeed/Z Axis/Z-4_Merovingian/core/**"
      - "desktop/LightSpeed_Runtime/lightspeed_runtime/project_pipeline.py"
      - "desktop/LightSpeed_Runtime/lightspeed_runtime/ls_go_bridge.py"
      - "desktop/LightSpeed_Runtime/tests/test_project_pipeline.py"
      - "desktop/LightSpeed_Runtime/tests/test_ls_go_bridge.py"
      - "scripts/run_merovingian_soft_launch.py"
      - "scripts/run_cognigrex_local_stack.py"
      - "tools/run_merovingian_soft_launch.cmd"
      - "tools/run_cognigrex_local_stack.cmd"
      - ".github/workflows/merovingian-project-routing.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: merovingian-project-routing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate health, projects, receipts and GO review
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bounded Python test dependencies
        run: python -m pip install --disable-pip-version-check pytest fastapi uvicorn httpx

      - name: Compile essential runtime
        id: compile
        shell: bash
        run: |
          set +e
          python -m py_compile \
            "desktop/Desktop_Hooks/LightSpeed/Z Axis/Z-4_Merovingian/core/__init__.py" \
            "desktop/Desktop_Hooks/LightSpeed/Z Axis/Z-4_Merovingian/core/services/__init__.py" \
            desktop/LightSpeed_Runtime/lightspeed_runtime/project_pipeline.py \
            desktop/LightSpeed_Runtime/lightspeed_runtime/ls_go_bridge.py \
            scripts/run_merovingian_soft_launch.py \
            scripts/run_cognigrex_local_stack.py \
            > compile.log 2>&1
          code=$?
          cat compile.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run static Merovingian contract check
        id: static
        shell: bash
        run: |
          set +e
          python scripts/run_merovingian_soft_launch.py \
            --static-check \
            --runtime-root desktop/LightSpeed_Runtime \
            --shell-root desktop/Desktop_Hooks/LightSpeed \
            > static-check.log 2>&1
          code=$?
          cat static-check.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run project and bridge tests
        id: python_tests
        shell: bash
        run: |
          set +e
          python -m pytest -q \
            desktop/LightSpeed_Runtime/tests/test_project_pipeline.py \
            desktop/LightSpeed_Runtime/tests/test_ls_go_bridge.py \
            > python-tests.log 2>&1
          code=$?
          cat python-tests.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/lightspeed-go/package-lock.json

      - name: Install LS GO dependencies
        id: npm_install
        shell: bash
        working-directory: apps/lightspeed-go
        run: |
          set +e
          npm ci > ../../npm-install.log 2>&1
          code=$?
          cat ../../npm-install.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Test LS GO
        id: npm_test
        shell: bash
        working-directory: apps/lightspeed-go
        run: |
          set +e
          npm test > ../../npm-test.log 2>&1
          code=$?
          cat ../../npm-test.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Type-check LS GO
        id: npm_check
        shell: bash
        working-directory: apps/lightspeed-go
        run: |
          set +e
          npm run check > ../../npm-check.log 2>&1
          code=$?
          cat ../../npm-check.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build LS GO
        id: npm_build
        shell: bash
        working-directory: apps/lightspeed-go
        run: |
          set +e
          npm run build > ../../npm-build.log 2>&1
          code=$?
          cat ../../npm-build.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload complete validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merovingian-project-routing-diagnostics
          path: |
            compile.log
            static-check.log
            python-tests.log
            npm-install.log
            npm-test.log
            npm-check.log
            npm-build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce combined result
        if: always()
        shell: bash
        run: |
          failed=0
          for value in \
            "${{ steps.compile.outputs.exit_code }}" \
            "${{ steps.static.outputs.exit_code }}" \
            "${{ steps.python_tests.outputs.exit_code }}" \
            "${{ steps.npm_install.outputs.exit_code }}" \
            "${{ steps.npm_test.outputs.exit_code }}" \
            "${{ steps.npm_check.outputs.exit_code }}" \
            "${{ steps.npm_build.outputs.exit_code }}"; do
            if [ "$value" != "0" ]; then
              failed=1
            fi
          done
          if [ "$failed" != "0" ]; then
            echo "One or more Merovingian/LS GO validation stages failed; inspect the diagnostic artifact."
          fi
          exit "$failed"
