name: LightSpeed Surface Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - "desktop/source-manifest.json"
      - "desktop/Desktop_Hooks/LightSpeed/**"
      - "desktop/LightSpeed_Runtime/**"
      - "scripts/validate_lightspeed_surfaces.py"
      - "scripts/refresh_desktop_source_manifest.py"
      - "scripts/validate_desporte_desktop_bridge.py"
      - "tools/run_desporte_desktop_probe.cmd"
      - ".github/workflows/lightspeed-surface-validation.yml"
  push:
    branches:
      - main
      - "ops/**"
      - "fix/**"
    paths:
      - "desktop/source-manifest.json"
      - "desktop/Desktop_Hooks/LightSpeed/**"
      - "desktop/LightSpeed_Runtime/**"
      - "scripts/validate_lightspeed_surfaces.py"
      - "scripts/refresh_desktop_source_manifest.py"
      - "scripts/validate_desporte_desktop_bridge.py"
      - "tools/run_desporte_desktop_probe.cmd"
      - ".github/workflows/lightspeed-surface-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lightspeed-surface-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate LightSpeed Desktop and De Sporte bridge
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile validators
        run: |
          python -m py_compile scripts/validate_lightspeed_surfaces.py
          python -m py_compile scripts/refresh_desktop_source_manifest.py
          python -m py_compile scripts/validate_desporte_desktop_bridge.py

      - name: Validate De Sporte Desktop bridge contract
        id: desporte
        shell: bash
        run: |
          set +e
          python scripts/validate_desporte_desktop_bridge.py \
            --json-output desporte-static-receipt.json \
            > desporte-validation.log 2>&1
          exit_code=$?
          cat desporte-validation.log
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Validate source manifest and runtime surfaces
        id: validation
        shell: bash
        run: |
          set +e
          python scripts/validate_lightspeed_surfaces.py > surface-validation.log 2>&1
          exit_code=$?
          cat surface-validation.log
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Generate bounded manifest refresh candidate
        if: steps.validation.outputs.exit_code != '0'
        run: |
          python scripts/refresh_desktop_source_manifest.py \
            --output refreshed-source-manifest.json

      - name: Upload validation diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lightspeed-surface-validation
          path: |
            desporte-validation.log
            desporte-static-receipt.json
            surface-validation.log
            refreshed-source-manifest.json
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce validation result
        if: always()
        shell: bash
        run: |
          failed=0
          if [ "${{ steps.desporte.outputs.exit_code }}" != "0" ]; then
            echo "De Sporte Desktop bridge validation failed."
            failed=1
          fi
          if [ "${{ steps.validation.outputs.exit_code }}" != "0" ]; then
            echo "Surface validation failed; inspect the lightspeed-surface-validation artifact."
            failed=1
          fi
          exit "$failed"
