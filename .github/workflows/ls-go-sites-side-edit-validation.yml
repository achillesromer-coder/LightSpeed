name: LS GO Sites Side Edit Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/lightspeed-go/**"
      - "docs/ls-go-launch/**"
      - ".github/workflows/ls-go-sites-side-edit-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Test and build LightSpeed GO
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/lightspeed-go
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/lightspeed-go/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Type check
        run: npm run check
      - name: Build current Site source
        run: npm run build
